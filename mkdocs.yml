site_name: Estação Meteorológica IoT — ESP32 + LoRa
site_description: >-
  Reprodução didática da Davis Vantage Pro2 — Fundamentos de Sistemas
  Embarcados (FGA/UnB)
site_author: Bruno Bragança dos Reis
site_url: https://brunobreis.github.io/trabalho_embarcados/
repo_url: https://github.com/BrunoBReis/trabalho_embarcados
repo_name: BrunoBReis/trabalho_embarcados

docs_dir: docs

theme:
  name: material
  language: pt-BR
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue grey
      toggle:
        icon: material/weather-night
        name: Modo claro
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue grey
      toggle:
        icon: material/weather-sunny
        name: Modo escuro
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.highlight

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.snippets          # inclui arquivos de fora do docs/ (PLANO.md)
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Início: index.md
  - Arquitetura: arquitetura.md
  - Conexões do hardware: conexoes.md
  - Componentes:
      - "BMP280 — temperatura/pressão": componentes/BMP280.md
      - "DHT11 — umidade": componentes/DHT11.md
      - "LDR KY-018 — luminosidade": componentes/LDR.md
      - "MH-RD + LM393 — chuva": componentes/pente_LM393.md
      - "Reed switch — vento": componentes/reed.md
      - "LED RGB — status": componentes/LED.md
      - "LoRa Ra-02 — rádio": componentes/LoRa.md
  - Plano e próximos passos: plano.md
  - Diário de bordo:
      - "00 — Ambiente": diario_bordo/00-ambiente.md
      - "01 — BMP280 (I²C)": diario_bordo/01-bmp280.md
      - "02 — LDR (ADC)": diario_bordo/02-ldr.md
      - "03 — Chuva (MH-RD)": diario_bordo/03-chuva.md
      - "04 — DHT11": diario_bordo/04-dht11.md
      - "05 — Vento (reed)": diario_bordo/05-vento.md
      - "06 — LED RGB (LEDC)": diario_bordo/06-led-rgb.md
      - "07 — Integração": diario_bordo/07-integracao.md
      - "08 — LoRa + SDR": diario_bordo/08-lora.md
      - "09 — MQTT": diario_bordo/09-mqtt.md
      - "10 — Dashboard": diario_bordo/10-dashboard.md
  - Pinagem (justificativas): pinagem.md

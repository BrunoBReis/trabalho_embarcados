# ============================================================
# Fiacao da estacao (no externo) — WireViz
# Fonte de verdade dos GPIOs: tabela canonica do CLAUDE.md.
# Regenerar o diagrama: make docs-wireviz -> docs/wireviz/estacao.svg
# Cores dos fios = sugestao p/ os jumpers (vermelho 3V3, preto GND).
# ============================================================

connectors:
  ESP32:
    type: ESP32 WROOM-32 DevKit (HW-394, 30 pinos)
    notes: alimentado via USB; reed usa pull-up interno
    pinlabels: [3V3, GND, GND_TOPO, D4, D5, D13, D14, D16, D17, D18,
                D19, D21, D22, D23, D25, D26, D27, D34, D35]

  BMP280:
    type: modulo I2C, endereco 0x76
    pinlabels: [VCC, GND, SCL, SDA]

  DHT11:
    type: modulo de 3 pinos (pull-up na plaquinha)
    pinlabels: [VCC, DADOS, GND]

  LDR:
    type: KY-018 (luminosidade)
    pinlabels: [S_AO, VCC, GND]

  MHRD:
    type: MH-RD (chuva)
    pinlabels: [AO, DO, GND, VCC]

  REED:
    type: reed switch (vento)
    notes: sem polaridade; debounce de 10 ms no firmware
    pincount: 2

  LED:
    type: modulo LED RGB — ANODO comum (silkscreen "-" enganoso!)
    notes: comum vai no 3V3; canais invertidos no LEDC
    pinlabels: [R, G, B, COMUM]

  RA02:
    type: Ai-Thinker Ra-02 (SX1278) 433 MHz
    notes: 3.3 V ESTRITO; antena via pigtail IPEX SEMPRE conectada
    pinlabels: [VCC33, GND_1, GND_2, SCK, MISO, MOSI, NSS, RST, DIO0]

cables:
  W_I2C:
    category: bundle
    wirecount: 4
    colors: [RD, BK, YE, GN]
  W_DHT:
    category: bundle
    wirecount: 3
    colors: [RD, BU, BK]
  W_LDR:
    category: bundle
    wirecount: 3
    colors: [VT, RD, BK]
  W_CHUVA:
    category: bundle
    wirecount: 4
    colors: [OG, WH, BK, RD]
  W_REED:
    category: bundle
    wirecount: 2
    colors: [GY, BK]
  W_LED:
    category: bundle
    wirecount: 4
    colors: [RD, GN, BU, WH]
  W_LORA:
    category: bundle
    wirecount: 9
    colors: [RD, BK, BK, YE, GN, BU, WH, OG, VT]
    notes: jumpers femea (lado Ra-02) e macho (lado protoboard)

connections:
  -
    - ESP32: [3V3, GND, D22, D21]
    - W_I2C: [1-4]
    - BMP280: [VCC, GND, SCL, SDA]
  -
    - ESP32: [3V3, D4, GND]
    - W_DHT: [1-3]
    - DHT11: [VCC, DADOS, GND]
  -
    - ESP32: [D34, 3V3, GND]
    - W_LDR: [1-3]
    - LDR: [S_AO, VCC, GND]
  -
    - ESP32: [D35, D27, GND, 3V3]
    - W_CHUVA: [1-4]
    - MHRD: [AO, DO, GND, VCC]
  -
    - ESP32: [D25, GND]
    - W_REED: [1-2]
    - REED: [1, 2]
  -
    - ESP32: [D16, D17, D13, 3V3]
    - W_LED: [1-4]
    - LED: [R, G, B, COMUM]
  -
    - ESP32: [3V3, GND, GND_TOPO, D18, D19, D23, D5, D14, D26]
    - W_LORA: [1-9]
    - RA02: [VCC33, GND_1, GND_2, SCK, MISO, MOSI, NSS, RST, DIO0]

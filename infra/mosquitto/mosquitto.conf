# Mosquitto minimo de bancada (Fase 5).
# O v2 por padrao so aceita conexao local e exige usuario — para a
# bancada, listener explicito + anonimo. Num produto real: senha + TLS.
listener 1883
allow_anonymous true

# Persistencia (retain e sessoes sobrevivem a restart do container).
persistence true
persistence_location /mosquitto/data/

# Log no stdout — aparece no `docker compose logs mosquitto`.
log_dest stdout

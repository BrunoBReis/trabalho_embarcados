# Infra do gateway no PC: receptor SDR (Fase 4) + broker MQTT (Fase 5).
# Proximas pecas: ponte SDR->MQTT, banco e dashboard (Fase 6).
services:
  mosquitto:
    image: eclipse-mosquitto:2.0.20   # pin de versao = build reprodutivel
    container_name: mosquitto
    ports:
      - "1883:1883"                   # exposto no host p/ mosquitto_sub/pub
      - "9001:9001"                   # MQTT sobre WebSocket p/ o dashboard
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto-data:/mosquitto/data
    restart: unless-stopped


  sdr-receptor:
    build: ./sdr
    container_name: sdr-receptor
    depends_on:
      - mosquitto
    # Acesso ao dongle USB. "privileged" e o atalho de bancada; da para
    # refinar depois com device_cgroup_rules se virar servico de verdade.
    privileged: true
    volumes:
      - /dev/bus/usb:/dev/bus/usb
    environment:
      LORA_FREQ: "433000000"
      LORA_SF: "12"        # 12 = didatico (atual); trocar p/ 7 na producao
      LORA_BW: "125000"
      LORA_CR: "1"         # 4/5
      SDR_RATE: "250000"
      SDR_GAIN: "30"
      MQTT_HOST: "mosquitto"   # nome do servico = hostname na rede do compose
      MQTT_PORT: "1883"
      MQTT_TOPICO_DADOS: "estacao/v1/dados"

  # Dashboard: pagina estatica; o browser assina o MQTT direto via
  # WebSocket (porta 9001) — nenhum backend proprio.
  dashboard:
    image: nginx:1.27-alpine          # pin de versao
    container_name: dashboard
    ports:
      - "8080:80"
    volumes:
      - ./web:/usr/share/nginx/html:ro
    restart: unless-stopped

volumes:
  mosquitto-data:

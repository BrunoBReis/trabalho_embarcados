# Infra do gateway no PC. Comeca com o receptor SDR; Mosquitto e o
# resto do pipeline entram na Fase 5.
services:
  sdr-receptor:
    build: ./sdr
    container_name: sdr-receptor
    # Acesso ao dongle USB. "privileged" e o atalho de bancada; da para
    # refinar depois com device_cgroup_rules se virar servico de verdade.
    privileged: true
    volumes:
      - /dev/bus/usb:/dev/bus/usb
    environment:
      LORA_FREQ: "433000000"
      LORA_SF: "12"        # 12 = didatico (atual); trocar p/ 7 na producao
      LORA_BW: "125000"
      LORA_CR: "1"         # 4/5
      SDR_RATE: "250000"
      SDR_GAIN: "30"
      LORA_FORMATO: "hex"  # pacote binario de 18 B; "ascii" p/ testes com texto
